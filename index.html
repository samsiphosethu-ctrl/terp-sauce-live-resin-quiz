<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Concentrate</title>
<style>
body {
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: #ffffff;
  color: #1B3A2F;
}
 
* { box-sizing: border-box; }
 
#quiz-wrap {
  max-width: 560px;
  margin: 0 auto;
  padding: 28px 20px 32px;
}
 
#quiz-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #7A8B82;
  margin-bottom: 10px;
}
 
#quiz-title {
  font-size: 22px;
  font-weight: 700;
  color: #1B3A2F;
  line-height: 1.3;
  margin: 0 0 6px;
}
 
#quiz-sub {
  font-size: 14px;
  color: #4A5D53;
  margin: 0 0 24px;
}
 
/* Progress bar */
#progress-track {
  width: 100%;
  height: 4px;
  background: #E8EFE8;
  border-radius: 99px;
  margin-bottom: 28px;
  overflow: hidden;
}
 
#progress-fill {
  height: 4px;
  background: #1B3A2F;
  border-radius: 99px;
  transition: width 0.4s ease;
  width: 0%;
}
 
/* Question card */
#question-card {
  background: #F8F6F2;
  border-radius: 16px;
  padding: 24px 22px 22px;
  margin-bottom: 0;
}
 
#q-counter {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #7A8B82;
  margin-bottom: 10px;
}
 
#q-text {
  font-size: 17px;
  font-weight: 700;
  color: #1B3A2F;
  line-height: 1.4;
  margin: 0 0 20px;
}
 
.opt-btn {
  display: flex;
  align-items: center;
  width: 100%;
  background: #ffffff;
  border: 1.5px solid #D8E4D8;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  text-align: left;
  transition: border-color 0.18s, background 0.18s, transform 0.12s;
  font-size: 14px;
  font-weight: 500;
  color: #1B3A2F;
  -webkit-tap-highlight-color: transparent;
}
 
.opt-btn:last-child { margin-bottom: 0; }
 
.opt-btn:hover {
  border-color: #1B3A2F;
  background: #F0F5F0;
  transform: translateY(-1px);
}
 
.opt-btn:active {
  transform: scale(0.98);
}
 
.opt-btn.selected {
  border-color: #1B3A2F;
  background: #1B3A2F;
  color: #ffffff;
}
 
.opt-icon {
  font-size: 20px;
  margin-right: 12px;
  flex-shrink: 0;
  line-height: 1;
}
 
.opt-text { line-height: 1.35; }
.opt-text strong { display: block; font-size: 14px; }
.opt-text span { font-size: 12px; opacity: 0.75; font-weight: 400; }
 
/* Result card */
#result-card {
  display: none;
  border-radius: 16px;
  overflow: hidden;
}
 
#result-banner {
  padding: 28px 24px 22px;
}
 
#result-eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 8px;
  opacity: 0.75;
}
 
#result-name {
  font-size: 26px;
  font-weight: 700;
  line-height: 1.2;
  margin: 0 0 10px;
}
 
#result-desc {
  font-size: 14px;
  line-height: 1.6;
  opacity: 0.9;
  margin: 0;
}
 
#result-body {
  background: #F8F6F2;
  padding: 20px 24px 22px;
}
 
#result-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 18px;
}
 
.tag {
  background: #ffffff;
  border: 1.5px solid #D8E4D8;
  color: #1B3A2F;
  font-size: 12px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 99px;
}
 
#result-cta {
  display: inline-block;
  background: #1B3A2F;
  color: #ffffff;
  font-size: 14px;
  font-weight: 700;
  padding: 13px 24px;
  border-radius: 12px;
  text-decoration: none;
  transition: opacity 0.18s, transform 0.12s;
  width: 100%;
  text-align: center;
  cursor: pointer;
  border: none;
  margin-bottom: 12px;
}
 
#result-cta:hover { opacity: 0.88; transform: translateY(-1px); }
#result-cta:active { transform: scale(0.98); }
 
#retake-btn {
  display: block;
  width: 100%;
  background: transparent;
  border: 1.5px solid #D8E4D8;
  color: #4A5D53;
  font-size: 13px;
  font-weight: 600;
  padding: 11px 24px;
  border-radius: 12px;
  cursor: pointer;
  transition: border-color 0.18s, background 0.18s;
  text-align: center;
}
 
#retake-btn:hover { border-color: #1B3A2F; background: #F0F5F0; }
 
/* Fade animation */
.fade-in {
  animation: fadeUp 0.3s ease both;
}
 
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
 
<div id="quiz-wrap">
  <div id="quiz-label">Quick Quiz</div>
  <div id="quiz-title">Which concentrate fits your setup?</div>
  <div id="quiz-sub">Three questions. Instant answer.</div>
 
  <div id="progress-track">
    <div id="progress-fill"></div>
  </div>
 
  <div id="question-card" class="fade-in">
    <div id="q-counter"></div>
    <div id="q-text"></div>
    <div id="options-wrap"></div>
  </div>
 
  <div id="result-card">
    <div id="result-banner">
      <div id="result-eyebrow">Your match</div>
      <div id="result-name"></div>
      <div id="result-desc"></div>
    </div>
    <div id="result-body">
      <div id="result-tags"></div>
      <a id="result-cta" href="#" target="_blank" rel="noopener"></a>
      <button id="retake-btn">Retake the quiz</button>
    </div>
  </div>
</div>
 
<script>
(function () {
 
  var questions = [
    {
      text: "What's your main setup?",
      options: [
        { icon: "💨", label: "Vape pen or disposable", sub: "I want something ready to go", value: "lr" },
        { icon: "🔥", label: "Dab rig or e-nail", sub: "I'm all in on the full experience", value: "ts" }
      ]
    },
    {
      text: "What matters most to you?",
      options: [
        { icon: "⚖️", label: "Consistent and versatile", sub: "Predictable results every session", value: "lr" },
        { icon: "🌿", label: "Maximum flavor intensity", sub: "I want to taste every terpene", value: "ts" }
      ]
    },
    {
      text: "How would you describe yourself as a concentrate user?",
      options: [
        { icon: "✌️", label: "Newer to concentrates", sub: "Still finding my groove", value: "lr" },
        { icon: "🎯", label: "Experienced and adventurous", sub: "I like the challenge of a runny texture", value: "ts" }
      ]
    }
  ];
 
  var results = {
    lr: {
      name: "Live Resin",
      desc: "Live resin fits your setup perfectly. It's versatile, predictable, and works seamlessly across vapes and rigs — without any hardware headaches.",
      tags: ["Consistent potency", "Hardware-friendly", "Great for vapes", "Easier to handle"],
      bg: "#1B3A2F",
      color: "#ffffff",
      ctaText: "Shop THCa Purple Afghani Disposable Vape — 2g / $59",
      ctaUrl: "https://mood.com/product/thca-purple-afghani-disposable-vape/dose-2g?bcc=vapes"
    },
    ts: {
      name: "Terp Sauce",
      desc: "Terp sauce is built for flavor-focused sessions on a rig or e-nail. With 3 to 4 times more terpenes than standard live resin, every dab is an experience.",
      tags: ["13–40% terpenes", "Full-spectrum flavor", "Diamond + sauce", "Rig-ready"],
      bg: "#D4A04A",
      color: "#1B3A2F",
      ctaText: "Shop THCa Tropical Storm Dab Badder — 2g / $89",
      ctaUrl: "https://mood.com/product/thca-tropical-storm-dab-badder"
    }
  };
 
  var answers = [];
  var current = 0;
 
  function sendHeight() {
    var h = document.body.scrollHeight;
    window.parent.postMessage({ type: "setHeight", height: h }, "*");
  }
 
  function renderQuestion() {
    var q = questions[current];
    document.getElementById("q-counter").textContent = "Question " + (current + 1) + " of " + questions.length;
    document.getElementById("q-text").textContent = q.text;
    document.getElementById("progress-fill").style.width = ((current / questions.length) * 100) + "%";
 
    var wrap = document.getElementById("options-wrap");
    wrap.innerHTML = "";
 
    q.options.forEach(function (opt) {
      var btn = document.createElement("button");
      btn.className = "opt-btn";
      btn.innerHTML =
        '<span class="opt-icon">' + opt.icon + '</span>' +
        '<span class="opt-text"><strong>' + opt.label + '</strong><span>' + opt.sub + '</span></span>';
      btn.addEventListener("click", function () {
        btn.classList.add("selected");
        answers.push(opt.value);
        setTimeout(function () {
          current++;
          if (current < questions.length) {
            var card = document.getElementById("question-card");
            card.classList.remove("fade-in");
            void card.offsetWidth;
            card.classList.add("fade-in");
            renderQuestion();
          } else {
            showResult();
          }
          sendHeight();
        }, 260);
      });
      wrap.appendChild(btn);
    });
 
    sendHeight();
  }
 
  function showResult() {
    var tally = { lr: 0, ts: 0 };
    answers.forEach(function (a) { tally[a]++; });
    var winner = tally.ts >= 2 ? "ts" : "lr";
    var r = results[winner];
 
    document.getElementById("question-card").style.display = "none";
    document.getElementById("progress-fill").style.width = "100%";
 
    var card = document.getElementById("result-card");
    card.style.display = "block";
    card.classList.remove("fade-in");
    void card.offsetWidth;
    card.classList.add("fade-in");
 
    document.getElementById("result-banner").style.background = r.bg;
    document.getElementById("result-banner").style.color = r.color;
    document.getElementById("result-eyebrow").style.color = r.color;
    document.getElementById("result-name").textContent = r.name;
    document.getElementById("result-name").style.color = r.color;
    document.getElementById("result-desc").textContent = r.desc;
    document.getElementById("result-desc").style.color = r.color;
 
    var tagsEl = document.getElementById("result-tags");
    tagsEl.innerHTML = "";
    r.tags.forEach(function (t) {
      var tag = document.createElement("span");
      tag.className = "tag";
      tag.textContent = t;
      tagsEl.appendChild(tag);
    });
 
    var cta = document.getElementById("result-cta");
    cta.textContent = r.ctaText;
    cta.href = r.ctaUrl;
 
    sendHeight();
  }
 
  document.getElementById("retake-btn").addEventListener("click", function () {
    answers = [];
    current = 0;
    document.getElementById("result-card").style.display = "none";
    var card = document.getElementById("question-card");
    card.style.display = "block";
    card.classList.remove("fade-in");
    void card.offsetWidth;
    card.classList.add("fade-in");
    renderQuestion();
    sendHeight();
  });
 
  renderQuestion();
  window.addEventListener("load", sendHeight);
  window.addEventListener("resize", sendHeight);
 
})();
</script>
</body>
</html>
